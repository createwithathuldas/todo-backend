server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
 
    client_max_body_size 25m;
 
    # Use Docker's built-in DNS resolver
    resolver 127.0.0.11 valid=30s;
 
    location /api/ {
        # Using a variable forces NGINX to resolve 'api' at runtime
        set $api_upstream http://api:8080;
       
        # Note: When using variables, NGINX doesn't automatically append the URI.
        # We rewrite it to match your original behavior.
        rewrite ^/api/(.*) /api/$1 break;
        proxy_pass $api_upstream;
       
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
 
    location /media/ {
        set $api_upstream http://api:8080;
        rewrite ^/media/(.*) /media/$1 break;
        proxy_pass $api_upstream;
       
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
 
    location /ws/ {
        set $api_upstream http://api:8080;
        rewrite ^/ws/(.*) /ws/$1 break;
        proxy_pass $api_upstream;
       
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
 
    location / {
        try_files $uri $uri/ /index.html;
    }
}