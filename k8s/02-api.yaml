apiVersion: v1
kind: Secret
metadata:
  name: api-secret
type: Opaque
stringData:
  connection-string: "Server=app-mysql;Port=3306;Database=TodoDB;User=root;Password=rootpassword;"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-api
  template:
    metadata:
      labels:
        app: product-api
    spec:
      containers:
        - name: product-api
          image: athulacr.azurecr.io/todo-backend:latest
          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: api-secret
                  key: connection-string
          ports:
            - containerPort: 5143
          readinessProbe:
            tcpSocket:
              port: 5143
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: product-api
spec:
  selector:
    app: product-api
  ports:
    - port: 5000
      targetPort: 5143
